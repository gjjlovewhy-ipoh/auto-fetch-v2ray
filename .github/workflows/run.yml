name: 每小时自动抓取v2ray
on:
  # 每小时整点运行
  schedule:
    - cron: '0 * * * *'
  # 允许手动点按钮立即运行
  workflow_dispatch:

jobs:
  get_content:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 下载链接内容保存为 vpnoutput.txt
        run: |
          curl -L -s "https://gh-proxy.org/https://raw.githubusercontent.com/snakem982/proxypool/main/source/v2ray-2.txt" -o vpnoutput.txt

      - name: 提交更新到仓库
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add vpnoutput.txt
          git commit -m "自动更新 vpnoutput.txt $(date)"
          git push
